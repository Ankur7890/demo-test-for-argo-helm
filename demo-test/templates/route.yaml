{{- if .Values.route }}
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ .Values.name }}
spec:
  to:
    kind: Service
    name: {{ . Values.name }}
    weight: 100
  port:
    targetPort: {{ .Values.service.port }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
